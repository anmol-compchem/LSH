# GPU environment — CUDA 12.1 via pip (avoids conda channel conflicts)
# Requires NVIDIA driver >= 530.30.02 (check with: nvidia-smi)
#
# Install:  conda env create -f environment-gpu-cu121.yml
# Activate: conda activate lshdp-gpu
# Then:     cd /path/to/LSH && pip install -e .

name: lshdp-gpu
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - pyyaml>=6.0
  - tqdm>=4.65
  - pytest>=7.4
  - ase>=3.22

  - pip
  - pip:
      - torch --index-url https://download.pytorch.org/whl/cu121
      - dscribe>=2.1
      - click>=8.1
      - rich>=13.0
