# =============================================================================
# LSH-DP Configuration File
# =============================================================================
# Locality-Sensitive Hashing-Based Dataset Reduction for Deep Potential Training
#
# Reference:
#   Anmol et al., J. Chem. Theory Comput. 2025, 21, 12, 6113–6120
# =============================================================================

# --- SOAP Descriptor Parameters ---
soap:
  r_cut: 6.0          # Cutoff radius (Angstrom)
  n_max: 4            # Number of radial basis functions
  l_max: 4            # Maximum angular momentum
  sigma: 1.0          # Gaussian smearing width
  rbf: gto            # Radial basis function type (gto or polynomial)
  periodic: true      # Enable periodic boundary conditions
  n_jobs: -1          # Parallel SOAP workers (-1 = all cores, 1 = serial)
  # species: null      # Auto-detected from trajectory; override as ["C", "H", "O"]

# --- Hashing Parameters ---
hashing:
  n_components: 100   # Number of PCA components
  n_hash: 100         # Number of hash functions
  bin_width: 0.004    # Bin width for LSH partitioning
  random_seed: 42     # Random seed for reproducibility

# --- Input / Output ---
io:
  input_file: simulation.xyz   # Input trajectory (any ASE-readable format)
  output_dir: results          # Output directory
  format: auto                 # Input format hint (auto, xyz, extxyz, lammps-dump-text, cif, etc.)
  output_format: extxyz        # Output format (extxyz, xyz, lammps-data, cif, vasp, etc.)
  # cell: [15.82, 15.82, 30.76]  # Override unit cell (optional)
  # pbc: true                     # Override PBC flag (optional)

# --- Frame Selection ---
selection:
  method: medoid     # How to pick representative frames per bin:
                     #   first  — first frame in bin (fast, naive)
                     #   random — random frame per bin
                     #   medoid — frame closest to bin centroid in descriptor space (best quality)
  random_seed: 42    # Seed for 'random' method

# --- Splitting ---
split:
  frames_per_file: 120         # Frames per output file

# --- Execution ---
device: auto                   # cpu, cuda, or auto
deterministic: true            # Enforce deterministic behaviour
# start_step: 1                # Start from step N (1-6)
# end_step: 6                  # End at step N (1-6)
# log_file: null               # Auto-generated if null
