name: lshdp
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python>=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - pyyaml>=6.0
  - tqdm>=4.65
  - pytest>=7.4

  # ASE & DScribe
  - ase>=3.22

  # PyTorch — CPU by default; see comments below for GPU
  - pytorch>=2.0
  - cpuonly  # REMOVE this line and uncomment pytorch-cuda for GPU support

  # Uncomment ONE of the following for GPU support:
  # - pytorch-cuda=11.8   # For CUDA 11.8
  # - pytorch-cuda=12.1   # For CUDA 12.1

  - pip

  - pip:
      - dscribe>=2.1
      - click>=8.1
      - rich>=13.0
