name: lshdp
channels:
  - conda-forge
  - pytorch
  - nvidia          # required for pytorch-cuda packages
  - defaults

dependencies:
  - python>=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - pyyaml>=6.0
  - tqdm>=4.65
  - pytest>=7.4

  # ASE & DScribe
  - ase>=3.22

  # ── PyTorch ────────────────────────────────────────────────────────
  # CPU-only install (default — safe on any machine):
  - pytorch>=2.0
  - cpuonly

  # ── FOR GPU: comment out the two lines above and uncomment ONE of
  #    the blocks below matching your CUDA driver version.
  #
  #    Check your driver version with: nvidia-smi
  #    CUDA 11.8 drivers: >=520.61.05
  #    CUDA 12.1 drivers: >=530.30.02
  #    CUDA 12.4 drivers: >=550.54.14
  #
  # --- CUDA 11.8 ---
  # - pytorch>=2.0
  # - pytorch-cuda=11.8
  #
  # --- CUDA 12.1 ---
  # - pytorch>=2.0
  # - pytorch-cuda=12.1
  #
  # --- CUDA 12.4 ---
  # - pytorch>=2.0
  # - pytorch-cuda=12.4
  # ────────────────────────────────────────────────────────────────────

  - pip

  - pip:
      - dscribe>=2.1
      - click>=8.1
      - rich>=13.0
